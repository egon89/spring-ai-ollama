spring:
  application:
    name: spring-ai-ollama
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2
          temperature: 0.7
  datasource:
    url: jdbc:postgresql://localhost:5432/pgvectordb
    username: myuser
    password: 123456
  threads:
    virtual:
      enabled: true

logging:
  level:
    root: INFO
    com.egon: INFO

rag:
  documents-path: /tmp/documents
