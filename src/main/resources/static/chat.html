<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Stream Client</title>
  <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
          crossorigin="anonymous"
  >
  <style>
    body {
    font-family: Arial, sans-serif;
    margin: 40px;
    }
    textarea {
    width: 100%;
    height: 80px;
    font-size: 16px;
    }
    button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    }
    .response-box {
    white-space: pre-wrap;
    background-color: #f8f9fa;
    padding: 1rem;
    border-radius: 0.5rem;
    border: 1px solid #dee2e6;
    margin-bottom: 1rem;
    }
  </style>
</head>
<body class="container py-5">
<h2 class="mb-4">Ollama Streaming</h2>
<ul class="nav nav-tabs" id="chatTabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" id="chat1-chat" data-bs-toggle="tab" data-bs-target="#chat1" type="button" role="tab" aria-controls="chat1" aria-selected="true">Chat 1</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="chat2-chat" data-bs-toggle="tab" data-bs-target="#chat2" type="button" role="tab" aria-controls="chat2" aria-selected="false">Chat 2</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="chat3-chat" data-bs-toggle="tab" data-bs-target="#chat3" type="button" role="tab" aria-controls="chat3" aria-selected="false">Chat 3</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="add-chat-btn" type="button">+ New Chat</button>
  </li>
</ul>
<div class="tab-content mt-4" id="chatTabsContent">
  <div class="tab-pane fade show active" id="chat1" role="tabpanel" aria-labelledby="chat1-chat">
    <div class="mb-3">
      <textarea id="messageInput-chat1" class="form-control" placeholder="Type your prompt here or get a poem..."></textarea>
    </div>
    <div class="mb-3">
      <button onclick="startStream('chat1')" class="btn btn-primary">Ask</button>
      <button onclick="stopStream('chat1')" class="btn btn-secondary">Stop</button>
    </div>
    <div id="responses-chat1"></div>
  </div>
  <div class="tab-pane fade" id="chat2" role="tabpanel" aria-labelledby="chat2-chat">
    <div class="mb-3">
      <textarea id="messageInput-chat2" class="form-control" placeholder="Type your prompt here or get a poem..."></textarea>
    </div>
    <div class="mb-3">
      <button onclick="startStream('chat2')" class="btn btn-primary">Ask</button>
      <button onclick="stopStream('chat2')" class="btn btn-secondary">Stop</button>
    </div>
    <div id="responses-chat2"></div>
  </div>
  <div class="tab-pane fade" id="chat3" role="tabpanel" aria-labelledby="chat3-chat">
    <div class="mb-3">
      <textarea id="messageInput-chat3" class="form-control" placeholder="Type your prompt here or get a poem..."></textarea>
    </div>
    <div class="mb-3">
      <button onclick="startStream('chat3')" class="btn btn-primary">Ask</button>
      <button onclick="stopStream('chat3')" class="btn btn-secondary">Stop</button>
    </div>
    <div id="responses-chat3"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Store eventSource for each chat
  const eventSources = {
    chat1: null,
    chat2: null,
    chat3: null
  };
  const streamingActive = {
    chat1: false,
    chat2: false,
    chat3: false
  };
  let chatCount = 3;

  document.getElementById('add-chat-btn').addEventListener('click', function() {
    chatCount++;
    const chatId = `chat${chatCount}`;

    // Create new chat button inside its own <li>
    const newChatLi = document.createElement('li');
    newChatLi.className = 'nav-item';
    newChatLi.setAttribute('role', 'presentation');

    const newChatBtn = document.createElement('button');
    newChatBtn.className = 'nav-link';
    newChatBtn.id = `${chatId}-chat`;
    newChatBtn.type = 'button';
    newChatBtn.setAttribute('data-bs-toggle', 'tab');
    newChatBtn.setAttribute('data-bs-target', `#${chatId}`);
    newChatBtn.setAttribute('role', 'tab');
    newChatBtn.setAttribute('aria-controls', chatId);
    newChatBtn.setAttribute('aria-selected', 'false');
    newChatBtn.textContent = `Chat ${chatCount}`;

    newChatLi.appendChild(newChatBtn);

    // Insert before the add-chat-btn's <li>
    const addChatBtn = document.getElementById('add-chat-btn');
    const addChatLi = addChatBtn.parentNode;
    addChatLi.parentNode.insertBefore(newChatLi, addChatLi);

    // Create new chat content
    const newChatPane = document.createElement('div');
    newChatPane.className = 'tab-pane fade';
    newChatPane.id = chatId;
    newChatPane.setAttribute('role', 'tabpanel');
    newChatPane.setAttribute('aria-labelledby', `${chatId}-chat`);
    newChatPane.innerHTML = `
      <div class="mb-3">
        <textarea id="messageInput-${chatId}" class="form-control" placeholder="Type your prompt here or get a poem..."></textarea>
      </div>
      <div class="mb-3">
        <button onclick="startStream('${chatId}')" class="btn btn-primary">Ask</button>
        <button onclick="stopStream('${chatId}')" class="btn btn-secondary">Stop</button>
      </div>
      <div id="responses-${chatId}"></div>
    `;
    document.getElementById('chatTabsContent').appendChild(newChatPane);

    // Add to eventSources
    eventSources[chatId] = null;

    // Add Ctrl+Enter shortcut for new textarea
    setCtrlEnterHandler(chatId);
  });

  function startStream(chatId) {
    streamingActive[chatId] = true;
    const messageInput = document.getElementById(`messageInput-${chatId}`);
    const message = messageInput.value;
    const responsesContainer = document.getElementById(`responses-${chatId}`);
    const generateBtn = document.querySelector(`#${chatId} .btn.btn-primary`);
    generateBtn.disabled = true;

    // Create new response box
    const responseWrapper = document.createElement("div");
    responseWrapper.className = "response-box";

    const questionLabel = document.createElement("strong");
    questionLabel.textContent = "You: ";
    const questionText = document.createElement("span");
    questionText.textContent = message;

    const answerLabel = document.createElement("div");
    answerLabel.classList.add("mt-2");
    answerLabel.innerHTML = "<strong>Assistant:</strong>";

    const responseText = document.createElement("div");
    responseText.className = "mt-1";

    responseWrapper.appendChild(questionLabel);
    responseWrapper.appendChild(questionText);
    responseWrapper.appendChild(answerLabel);
    responseWrapper.appendChild(responseText);
    responsesContainer.prepend(responseWrapper);

    // Close previous stream if exists
    if (eventSources[chatId]) {
      eventSources[chatId].close();
    }

    const url = `/chat/${chatId}/stream?message=${encodeURIComponent(message)}`;
    eventSources[chatId] = new EventSource(url);

    eventSources[chatId].onmessage = function(event) {
      if (event.data === "<END_OF_RESPONSE>") {
        eventSources[chatId].close();
        generateBtn.disabled = false;
        streamingActive[chatId] = false;
        return;
      }
      responseText.textContent += event.data;
      responseText.scrollTop = responseText.scrollHeight;
    };

    eventSources[chatId].onerror = function(error) {
      console.error("Stream error:", error);
      eventSources[chatId].close();
      streamingActive[chatId] = false;
    };

    // Reset input
    messageInput.value = "";
  }

  function stopStream(chatId) {
    const generateBtn = document.querySelector(`#${chatId} .btn.btn-primary`);

    if (eventSources[chatId]) {
      eventSources[chatId].close();
      generateBtn.disabled = false;
      streamingActive[chatId] = false;
      console.log(`Stream stopped for ${chatId}.`);
    }
  }

  // Add Ctrl+Enter shortcut for all textarea
  function setCtrlEnterHandler(chatId) {
    const textarea = document.getElementById(`messageInput-${chatId}`);
    if (textarea) {
      textarea.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter' && !streamingActive[chatId]) {
          e.preventDefault();
          startStream(chatId);
        }
      });
    }
  }

  // Set shortcut for initial chats
  setCtrlEnterHandler('chat1');
  setCtrlEnterHandler('chat2');
  setCtrlEnterHandler('chat3');
</script>
</body>
</html>
